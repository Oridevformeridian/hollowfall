version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hollowfall-postgres
    restart: always
    environment:
      POSTGRES_USER: hollowfall
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: hollowfall_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
